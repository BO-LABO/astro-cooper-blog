faq.default.subtitle=製品と請求に関するすべての情報。
faq.home.1.q=このボイラープレートは無料ですか？
faq.home.1.a=はい！コアテンプレートはオープンソースで、個人・商用プロジェクトに無料で使用できます。高度な機能と専用サポートを備えたProバージョンもご用意しています。
faq.home.2.q=Reactの知識は必要ですか？
faq.home.2.a=インタラクティブアイランドにReactを使用していますが、Vue、Svelte、Solidなど任意のフレームワーク、またはバニラJSのみでも使用できます。Astroは設計上フレームワーク非依存です。
faq.home.3.q=検索機能はどのように動作しますか？
faq.home.3.a=Fuse.jsという軽量なファジー検索ライブラリを使用しています。外部サーバーやAPIキーなしに、即座にタイポ対応の検索結果を提供します。
faq.home.4.q=Vercel/Netlifyにデプロイできますか？
faq.home.4.a=もちろんです。テンプレートはVercel、Netlify、Cloudflare Pages用のアダプターが事前設定されています。GitHubにプッシュしてリポジトリを接続するだけです。
faq.home.5.q=「プレミアム」の理由は何ですか？
faq.home.5.a=デザインに加え、SEO・アナリティクス・サイトマップ・RSSフィード・OGP画像・ダークモード・アクセシビリティなど、本番環境対応の設定がすぐに使えます。
faq.pricing.1.q=後でプランを変更できますか？
faq.pricing.1.a=はい、いつでもアップグレードまたはダウングレードできます。日割り計算が適用されます。
faq.pricing.2.q=無料トライアルはありますか？
faq.pricing.2.a=Proプランで14日間の無料トライアルをご利用いただけます。
faq.pricing.3.q=どの支払い方法が使えますか？
faq.pricing.3.a=主要なクレジットカード、PayPal、Enterpriseには銀行振込が使えます。
faq.pricing.4.q=返金は可能ですか？
faq.pricing.4.a=ご満足いただけない場合、30日間の返金保証があります。
