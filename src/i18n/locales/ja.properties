about.title=私たちは<span class="text-primary">探求者</span>です
about.mission=私たちの使命は、星々の中に人類の新しる故郷を見つけ、種の生存を確かにすることです。
about.story.title=ミッション
about.story.p1=枯れ病から始まりました。世界に必要なのは技術者ではなく農家でした。しかし、土を見下ろすことが答えではないとわかっていました。上を見なければなりませんでした。
about.story.p2=ラザルスミッションが希望を与えてくれました。居住可能な世界を見つけるために未知の領域に送られた12人のレンジャー。私たちはエンデュアランスを建造しました。
about.story.p3=今日、私たちは新しい次元の瀬戸際に立っています。時間と空間を超えた愛に駆られた未来の管理者として。
